version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qukia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qukia
      POSTGRES_PASSWORD: qukia_dev_pass
      POSTGRES_DB: qukia_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: qukia_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
